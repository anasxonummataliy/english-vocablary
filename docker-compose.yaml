services:
  bot:
    image: ghcr.io/anasxonummataliy/english-vocab:latest
    container_name: english_vocab
    env_file:
      - .env
    ports:
      - "8000:8000" 
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    restart: always
    depends_on:
      - postgres
    networks:
      - app-network

  postgres:
    image: postgres:16
    container_name: english_vocab_db
    env_file:
      - .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app-network
    restart: always
  


volumes:
  pgdata:

networks:
  app-network:
    driver: bridge
