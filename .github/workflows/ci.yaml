name: Build & Publish

on:
  push:
    branches:
      - "development"

permissions:
  contents: read
  packages: write
  pull-requests: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Docker image
        run: docker build -t ghcr.io/${{ github.repository_owner }}/english-vocablary:latest .

      - name: Push Docker image
        run: docker push ghcr.io/${{ github.repository_owner }}/english-vocablary:latest
